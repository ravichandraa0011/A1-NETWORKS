{% extends 'network/base.html' %}
{% block title %}Analytics | A1 Networks{% endblock %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto; padding: 20px;">
    
    <div class="glass-card" style="padding: 40px;">
        <h2 style="font-size: 2rem; margin-bottom: 5px;">📊 Profile Analytics</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Track your visibility and network reach over the last 7 days.</p>
        
        <div style="position: relative; height: 400px; width: 100%;">
            <canvas id="viewsChart"></canvas>
        </div>
    </div>
</div>


{{ dates|json_script:"dates-data" }}
{{ chart_data|json_script:"chart-data" }}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Safely parse the data without quote errors!
        const dates = JSON.parse(document.getElementById('dates-data').textContent);
        const dataPoints = JSON.parse(document.getElementById('chart-data').textContent);

        const canvas = document.getElementById('viewsChart');
        if (!canvas) return; // Failsafe
        
        const ctx = canvas.getContext('2d');
        
        // Create a beautiful Amber Gradient
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(245, 158, 11, 0.5)'); 
        gradient.addColorStop(1, 'rgba(245, 158, 11, 0.0)'); 

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Unique Profile Views',
                    data: dataPoints,
                    borderColor: '#f59e0b',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#f59e0b',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    fill: true,
                    tension: 0.4 // Makes the line smoothly curved
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1, color: '#64748b' },
                        grid: { color: 'rgba(0,0,0,0.05)' }
                    },
                    x: {
                        ticks: { color: '#64748b' },
                        grid: { display: false }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
